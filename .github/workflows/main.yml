<!-- FLOATING BUTTONS -->
<a id="wa-float" href="https://wa.me/919876543210" target="_blank" rel="noopener" aria-label="Chat on WhatsApp">
  <svg viewBox="0 0 24 24"><path d="M17.47 14.38c-.3-.15-1.75-.86-2.02-.96s-.47-.15-.67.15-.77.96-.95 1.16-.34.22-.64.07a8.07 8.07 0 01-2.37-1.46 9 9 0 01-1.64-2.04c-.17-.3 0-.46.13-.6s.3-.35.44-.52a2 2 0 00.3-.5.55.55 0 000-.52c-.07-.15-.67-1.6-.91-2.19s-.48-.5-.66-.5h-.56a1.1 1.1 0 00-.78.36 3.3 3.3 0 00-1 2.46 5.72 5.72 0 001.2 3.04 13.14 13.14 0 005 4.41c.7.3 1.25.48 1.67.62a4 4 0 001.85.12 3 3 0 002-1.4 2.47 2.47 0 00.17-1.4c-.07-.12-.27-.2-.57-.34zM12 2A10 10 0 002.46 16.9L2 22l5.25-.46A10 10 0 1012 2z"/></svg>
