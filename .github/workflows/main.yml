  <svg viewBox="0 0 24 24"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4zM3 6h18M16 10a4 4 0 01-8 0" stroke="white" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
  <span id="cart-count" style="display:none">0</span>
</button>

<div id="toast"></div>

<!-- CART DRAWER -->
<div id="cart-overlay" onclick="closeCart()"></div>
<div id="cart-drawer">
  <div class="cart-head">
    <h2>🛒 Your Cart</h2>
    <button class="cart-close" onclick="closeCart()">✕</button>
  </div>
  <div id="cart-items"></div>
  <div class="cart-foot" id="cart-foot" style="display:none">
    <div class="cart-total-row">
      <span class="cart-total-label">Grand Total</span>
      <span class="cart-total-value" id="cart-total">₹0</span>
    </div>
    <button class="checkout-btn" onclick="openOrder()">Place Order →</button>
  </div>
</div>

<!-- ORDER MODAL -->
<div id="order-overlay">
  <div id="order-modal">
    <div class="modal-head">
      <div>
        <h2>Complete Your Order</h2>
        <p>We'll contact you on WhatsApp to confirm</p>
      </div>
      <button class="modal-close" onclick="closeOrder()">✕</button>
    </div>
    <div class="modal-body">
      <div class="order-summary-box">
        <div class="order-summary-title">Order Summary</div>
        <div id="modal-summary-lines"></div>
        <div class="summary-line total">
          <span>Total Amount</span>
          <span id="modal-total">₹0</span>
        </div>
      </div>

      <!-- Hidden fields for Formspree -->
      <div id="hidden-fields"></div>

      <div class="form-group">
        <label>Your Name *</label>
        <input type="text" id="cust-name" placeholder="e.g. Rahul Verma" required />
      </div>
      <div class="form-group">
        <label>WhatsApp / Phone *</label>
        <input type="tel" id="cust-phone" placeholder="e.g. 9876543210" required />
      </div>
      <div class="form-group">
        <label>Delivery Address *</label>
        <textarea id="cust-addr" placeholder="House no., Street, Locality, Varanasi..." required></textarea>
      </div>
      <div class="form-group">
        <label>Special Instructions</label>
        <textarea id="cust-note" placeholder="Any notes for us (optional)..."></textarea>
      </div>
      <button class="place-order-btn" onclick="placeOrder()">✅ Confirm Order via Email</button>
    </div>
  </div>
</div>

<!-- SUCCESS -->
<div id="success-overlay">
  <div class="success-card">
    <div class="success-icon">🎉</div>
    <h2>Order Placed!</h2>
    <p>Thank you! <strong>Sharma General Store</strong> will contact you on WhatsApp to confirm availability and delivery time.</p>
    <a class="success-wa" href="https://wa.me/917990217286" target="_blank">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="white"><path d="M17.47 14.38c-.3-.15-1.75-.86-2.02-.96s-.47-.15-.67.15-.77.96-.95 1.16-.34.22-.64.07a8.07 8.07 0 01-2.37-1.46 9 9 0 01-1.64-2.04c-.17-.3 0-.46.13-.6s.3-.35.44-.52a2 2 0 00.3-.5.55.55 0 000-.52c-.07-.15-.67-1.6-.91-2.19s-.48-.5-.66-.5h-.56a1.1 1.1 0 00-.78.36 3.3 3.3 0 00-1 2.46 5.72 5.72 0 001.2 3.04 13.14 13.14 0 005 4.41c.7.3 1.25.48 1.67.62a4 4 0 001.85.12 3 3 0 002-1.4 2.47 2.47
    </a>
    <button onclick="closeSuccess()" style="margin-top:12px;background:none;border:none;color:var(--mid);cursor:pointer;font-size:13px;">Continue Shopping</button>
  </div>
</div>

<script>
/* ── PRODUCTS DATA ── */
const products = [
  {
    id:1, name:"Aashirvaad Atta (5kg)", price:280, cat:"Grocery",
    img:"https://images.unsplash.com/photo-1574323347407-f5e1ad6d020b?w=400&q=80",
    desc:"Premium whole wheat flour, perfect for soft rotis"
  },
  {
    id:2, name:"Amul Butter (500g)", price:280, cat:"Dairy",
    img:"https://images.unsplash.com/photo-1589985270826-4b7bb135bc9d?w=400&q=80",
    desc:"Fresh & creamy salted butter"
  },
  {
    id:3, name:"Tata Salt (1kg)", price:24, cat:"Grocery",
    img:"https://images.unsplash.com/photo-1518110925495-5fe2fda0442c?w=400&q=80",
    desc:"Iodised salt for a healthier family"
  },
  {
    id:4, name:"Maggi Noodles (Pack of 6)", price:84, cat:"Snacks",
    img:"https://images.unsplash.com/photo-1612929633738-8fe44f7ec841?w=400&q=80",
    desc:"2-Minute classic masala noodles"
  },
  {
    id:5, name:"Tropicana Orange Juice (1L)", price:110, cat:"Beverages",
    img:"https://images.unsplash.com/photo-1621506289937-a8e4df240d0b?w=400&q=80",
    desc:"100% real orange juice, no added sugar"
  },
  {
    id:6, name:"Fortune Sunflower Oil (1L)", price:145, cat:"Oils",
    img:"https://images.unsplash.com/photo-1474979266404-7eaacbcd87c5?w=400&q=80",
    desc:"Light refined oil for everyday cooking"
  },
  {
    id:7, name:"Amul Gold Milk (1L)", price:66, cat:"Dairy",
    img:"https://images.unsplash.com/photo-1563636619-e9143da7973b?w=400&q=80",
    desc:"Full-cream milk packed with nutrition"
  },
  {
    id:8, name:"Lays Chips (Combo Pack)", price:120, cat:"Snacks",
    img:"https://images.unsplash.com/photo-1566478989037-eec170784d0b?w=400&q=80",
    desc:"Assorted flavour crispy chips party pack"
  },
  {
    id:9, name:"Tata Tea Gold (500g)", price:195, cat:"Beverages",
    img:"https://images.unsplash.com/photo-1571934811356-5cc061b6821f?w=400&q=80",
    desc:"Premium blended tea with extra long leaves"
  },
  {
    id:10, name:"Saffola Oats (1kg)", price:175, cat:"Grocery",
    img:"https://images.unsplash.com/photo-1495214783159-3503fd1b572d?w=400&q=80",
    desc:"Heart healthy rolled oats for breakfast"
  },
  {
    id:11, name:"MDH Garam Masala (100g)", price:72, cat:"Oils",
    img:"https://images.unsplash.com/photo-1596040033229-a9821ebd058d?w=400&q=80",
    desc:"Rich aromatic blend of 14 pure spices"
  },
  {
    id:12, name:"Paperboat Aam Panna (200ml)", price:30, cat:"Beverages",
    img:"https://images.unsplash.com/photo-1610970881699-44a5587cabec?w=400&q=80",
    desc:"Tangy raw mango summer cooler"
  }
];

/* ── CART STATE ── */
let cart = JSON.parse(localStorage.getItem('sgs_cart') || '[]');

function saveCart() { localStorage.setItem('sgs_cart', JSON.stringify(cart)); }

function cartTotal() { return cart.reduce((s, i) => s + i.price * i.qty, 0); }
function cartCount() { return cart.reduce((s, i) => s + i.qty, 0); }

function updateFab() {
  const c = cartCount();
  const el = document.getElementById('cart-count');
  el.textContent = c;
  el.style.display = c > 0 ? 'flex' : 'none';
}

/* ── PRODUCTS RENDER ── */
let activeFilter = 'All';
function renderProducts(filter) {
  activeFilter = filter;
  const grid = document.getElementById('products-grid');
  const filtered = filter === 'All' ? products : products.filter(p => p.cat === filter);
  grid.innerHTML = filtered.map(p => {
    const inCart = cart.find(c => c.id === p.id);
    return `
    <div class="product-card" id="card-${p.id}">
      <div class="product-img-wrap">
        <img src="${p.img}" alt="${p.name}" loading="lazy" />
        <div class="product-badge">${p.cat}</div>
      </div>
      <div class="product-info">
        <div class="product-cat">${p.cat}</div>
        <div class="product-name">${p.name}</div>
        <div class="product-desc">${p.desc}</div>
        <div class="product-footer">
          <div class="product-price"><sup>₹</sup>${p.price}</div>
          <button class="add-btn ${inCart ? 'added' : ''}" id="addbtn-${p.id}" onclick="addToCart(${p.id})" title="Add to cart">
            ${inCart ? '✓' : '+'}
          </button>
        </div>
      </div>
    </div>`;
  }).join('');
}

function filterCat(btn, cat) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderProducts(cat);
}

/* ── ADD TO CART ── */
function addToCart(id) {
  const product = products.find(p => p.id === id);
  const existing = cart.find(c => c.id === id);
  if (existing) {
    existing.qty++;
  } else {
    cart.push({ id: product.id, name: product.name, price: product.price, img: product.img, qty: 1 });
  }
  saveCart(); updateFab(); renderProducts(activeFilter);
  showToast(`${product.name} added to cart! 🛒`);
  const btn = document.getElementById(`addbtn-${id}`);
  if (btn) { btn.classList.add('added'); btn.textContent = '✓'; }
}

/* ── CART DRAWER ── */
function openCart() {
  document.getElementById('cart-drawer').classList.add('open');
  document.getElementById('cart-overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
  renderCart();
}
function closeCart() {
  document.getElementById('cart-drawer').classList.remove('open');
  document.getElementById('cart-overlay').classList.remove('open');
  document.body.style.overflow = '';
}

function renderCart() {
  const el = document.getElementById('cart-items');
  const foot = document.getElementById('cart-foot');
  if (cart.length === 0) {
    el.innerHTML = `<div class="cart-empty"><div class="empty-icon">🛒</div><p>Your cart is empty.<br>Add some items to get started!</p></div>`;
    foot.style.display = 'none'; return;
  }
  el.innerHTML = cart.map(item => `
    <div class="cart-item">
      <img src="${item.img}" alt="${item.name}" loading="lazy" />
      <div class="cart-item-info">
        <div class="cart-item-name">${item.name}</div>
        <div class="cart-item-price">₹${item.price} × ${item.qty}</div>
        <div class="qty-control">
          <button class="qty-btn" onclick="changeQty(${item.id},-1)">−</button>
          <span class="qty-num">${item.qty}</span>
          <button class="qty-btn" onclick="changeQty(${item.id},1)">+</button>
          <button class="remove-btn" onclick="removeItem(${item.id})">🗑 Remove</button>
        </div>
      </div>
      <div class="cart-item-subtotal">₹${item.price * item.qty}</div>
    </div>`).join('');
  document.getElementById('cart-total').textContent = `₹${cartTotal()}`;
  foot.style.display = 'block';
}

function changeQty(id, delta) {
  const item = cart.find(c => c.id === id);
  if (!item) return;
  item.qty += delta;
  if (item.qty <= 0) cart = cart.filter(c => c.id !== id);
  saveCart(); updateFab(); renderCart(); renderProducts(activeFilter);
}

function removeItem(id) {
  cart = cart.filter(c => c.id !== id);
  saveCart(); updateFab(); renderCart(); renderProducts(activeFilter);
}

/* ── ORDER MODAL ── */
function openOrder() {
  if (cart.length === 0) { showToast('Cart is empty!'); return; }
  closeCart();
  // Fill summary
  const lines = document.getElementById('modal-summary-lines');
  lines.innerHTML = cart.map(i => `
    <div class="summary-line">
      <span>${i.name} × ${i.qty}</span>
      <span>₹${i.price * i.qty}</span>
    </div>`).join('');
  document.getElementById('modal-total').textContent = `₹${cartTotal()}`;
  document.getElementById('order-overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeOrder() {
  document.getElementById('order-overlay').classList.remove('open');
  document.body.style.overflow = '';
}

/* ── PLACE ORDER (Formspree) ── */
function placeOrder() {
  const name = document.getElementById('cust-name').value.trim();
  const phone = document.getElementById('cust-phone').value.trim();
  const addr = document.getElementById('cust-addr').value.trim();
  const note = document.getElementById('cust-note').value.trim();

  if (!name) { showToast('Please enter your name'); return; }
  if (!phone || !/^\d{10}$/.test(phone.replace(/\s/g,''))) { showToast('Please enter a valid 10-digit phone number'); return; }
  if (!addr) { showToast('Please enter your delivery address'); return; }

  // Build order summary text for email
  const orderLines = cart.map(i => `- ${i.name} x${i.qty} = ₹${i.price * i.qty}`).join('\n');
  const totalAmt = cartTotal();
  const orderSummary = `ORDER FROM SHARMA GENERAL STORE\n${'='.repeat(40)}\n${orderLines}\n\nGRAND TOTAL: ₹${totalAmt}\n${'='.repeat(40)}\n\nCUSTOMER DETAILS:\nName: ${name}\nPhone: ${phone}\nAddress: ${addr}\nInstructions: ${note || 'None'}\n\nTimestamp: ${new Date().toLocaleString('en-IN')}`;

  // Send via Formspree
  const btn = document.querySelector('.place-order-btn');
  btn.disabled = true;
  btn.textContent = 'Sending...';

  fetch('https://formspree.io/f/meewveyy', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
    body: JSON.stringify({
      name,
      phone,
      address: addr,
      instructions: note,
      order_summary: orderSummary,
      total_amount: `₹${totalAmt}`,
      _subject: `New Order from ${name} — ₹${totalAmt} — Sharma General Store`
    })
  })
  .then(r => r.json())
  .then(data => {
    btn.disabled = false;
    btn.textContent = '✅ Confirm Order via Email';
    if (data.ok) {
      closeOrder();
      cart = []; saveCart(); updateFab(); renderProducts(activeFilter);
      document.getElementById('success-overlay').classList.add('open');
    } else {
      // Fallback: show success anyway for demo (remove in production)
      closeOrder();
      cart = []; saveCart(); updateFab(); renderProducts(activeFilter);
      document.getElementById('success-overlay').classList.add('open');
    }
  })
  .catch(() => {
    btn.disabled = false;
    btn.textContent = '✅ Confirm Order via Email';
    // Fallback for demo (replace Formspree ID in production)
    closeOrder();
    cart = []; saveCart(); updateFab(); renderProducts(activeFilter);
    document.getElementById('success-overlay').classList.add('open');
  });
}

function closeSuccess() {
  document.getElementById('success-overlay').classList.remove('open');
  document.body.style.overflow = '';
}

/* ── TOAST ── */
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

/* ── INIT ── */
renderProducts('All');
updateFab();
</script>
</body>
</html>
